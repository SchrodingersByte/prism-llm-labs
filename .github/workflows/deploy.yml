name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Deploy without --prebuilt: Vercel builds on its own infrastructure
      # where all env vars (including NEXT_PUBLIC_*) are injected at build time.
      # Previously we ran `vercel build` in CI, which pre-compiled the bundle
      # without Vercel's env vars — NEXT_PUBLIC_SUPABASE_URL etc. were baked
      # in as empty strings even though they're set in the Vercel dashboard.
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
