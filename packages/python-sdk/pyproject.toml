[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prism-llm-labs"
version = "0.4.0"
description = "LLM cost and usage observability SDK"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "openai>=1.0.0",
  "httpx>=0.25.0",
  "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-asyncio",
  "respx",
]
anthropic = [
  "anthropic>=0.25.0",
]
google = [
  "google-generativeai>=0.5.0",
]
langchain = [
  "langchain-core>=0.3.0",
]
mcp = [
  "mcp>=1.0.0",
]
all = [
  "anthropic>=0.25.0",
  "google-generativeai>=0.5.0",
  "langchain-core>=0.3.0",
  "mcp>=1.0.0",
]

[project.scripts]
prism-evals = "prism.evals:run_eval_cli"

[tool.hatch.build]
ignore-vcs = true

[tool.hatch.build.targets.wheel]
packages = ["prism"]
